services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kasi:kasi@db:5432/kasigsm
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: ./entrypoint.sh

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kasi
      POSTGRES_PASSWORD: kasi
      POSTGRES_DB: kasigsm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasi -d kasigsm"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    build: .
    environment:
      - DATABASE_URL=postgresql://kasi:kasi@db:5432/kasigsm
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python scripts/seed_auth.py
    profiles:
      - tools

volumes:
  pgdata:
